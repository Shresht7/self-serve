name: Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
            - run: deno test --allow-read
